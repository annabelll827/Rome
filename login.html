<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROMA STONE - Login</title>

<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="container">

<div class="login-box">

<h1>ROMA STONE</h1>

<p>چوونەژوورەوە بۆ داشبۆرد</p>

<form id="loginForm">

<input type="text" id="username" placeholder="ناوی بەکارهێنەر" required>

<input type="password" id="password" placeholder="وشەی نهێنی" required>

<button type="submit">
<i class="fa-solid fa-right-to-bracket"></i>
چوونەژوورەوە
</button>

</form>

</div>

</div>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", function(e){

e.preventDefault();

const username = document.getElementById("username").value.trim();

const password = document.getElementById("password").value.trim();

if(username === "admin" && password === "1234"){

window.location.href = "index.html";

}else{

alert("ناوی بەکارهێنەر یان وشەی نهێنی هەڵەیە");

}

});

</script>

</body>
</html>
